<head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    @keyframes pulse { 0%,100%{transform:scale(0.7);opacity:0.4} 50%{transform:scale(1.1);opacity:1} }

<body>
<div id="root"></div>
<script type="text/babel">

const C = {
  navy:"#0d2461", blue:"#1565c0", teal:"#00acc1", orange:"#f5a623",
  white:"#ffffff", bg:"#f0f4f8", text:"#1a2a4a", muted:"#7a90b0", border:"#dde6f0"

const SYSTEM_KOK = `Είσαι ο "Σύμβουλος ΚΟΚ" του Symvo AI — εξειδικευμένος AI βοηθός που αναλύει τροχαία ατυχήματα βάσει του Ελληνικού ΚΟΚ (Ν.2696/1999). Όταν ο χρήστης περιγράφει ένα ατύχημα: 1. Ανέλυσε ποιος παρέβη ποιο άρθρο ΚΟΚ 2. Δώσε εκτίμηση ευθύνης (π.χ. 100% οδηγός Α ή 70%-30%) 3. Εξήγησε το σκεπτικό με αναφορά σε άρθρα ΚΟΚ 4. Πρόσθεσε πρακτικές συμβουλές 5. Πες ότι η τελική κρίση ανήκει στις αρχές. Απάντα ΠΑΝΤΑ στα Ελληνικά. Χρησιμοποίησε emoji.`;

const SYSTEM_GUIDE = `Είσαι ο βοηθός ατυχήματος του Symvo AI. Ο χρήστης μόλις είχε ατύχημα. Βοήθησέ τον βήμα-βήμα: 1. Ρώτα αν είναι καλά 2. Πες τι να κάνει ΑΜΕΣΑ 3. Καθοδήγησέ τον για δήλωση 4. Πες τι να ΜΗΝ κάνει 5. Υπενθύμισε ασφαλιστική εντός 8 ημερών. Να είσαι ΗΡΕΜΟΣ και ΣΑΦΗΣ. Απάντα στα Ελληνικά. Χρησιμοποίησε ✅ για βήματα.`;

function SymvoLogo({ size = 40 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" fill="none">
      <path d="M50 8 A42 42 0 0 0 8 50" stroke="#00bcd4" strokeWidth="14" strokeLinecap="round" fill="none"/>
      <path d="M8 50 A42 42 0 0 0 50 92" stroke="#1565c0" strokeWidth="14" strokeLinecap="round" fill="none"/>
      <path d="M50 92 A42 42 0 0 0 92 50" stroke="#0d2461" strokeWidth="14" strokeLinecap="round" fill="none"/>
      <path d="M92 50 A42 42 0 0 0 50 8" stroke="#f5a623" strokeWidth="14" strokeLinecap="round" fill="none"/>
      <circle cx="50" cy="50" r="20" fill="white"/>
      <path d="M50 30 A20 20 0 0 0 30 50" stroke="#00bcd4" strokeWidth="5" strokeLinecap="round" fill="none"/>
    </svg>
  );
}

function TopBar({ title, onBack }) {
  return (
    <div style={{background:C.navy, padding:"16px 20px", display:"flex", alignItems:"center", gap:12, position:"sticky", top:0, zIndex:50}}>
      {onBack && <button onClick={onBack} style={{background:"rgba(255,255,255,0.15)", border:"none", borderRadius:8, width:36, height:36, color:C.white, fontSize:18, cursor:"pointer"}}>←</button>}
      <div style={{display:"flex", alignItems:"center", gap:8}}>
        <SymvoLogo size={34}/>
        <div>
          <div style={{color:C.white, fontWeight:700, fontSize:15}}>{title}</div>
          <div style={{color:"rgba(255,255,255,0.6)", fontSize:10, letterSpacing:1}}>SYMVO AI</div>
        </div>
      </div>
    </div>
  );
}

function Card({ children, style={}, onClick }) {
  return (
    <div onClick={onClick} style={{background:C.white, borderRadius:16, padding:18, boxShadow:"0 2px 12px rgba(13,36,97,0.08)", border:`1px solid ${C.border}`, cursor:onClick?"pointer":"default", ...style}}>
      {children}
    </div>
  );
}

function ChatScreen({ systemPrompt, title, welcomeMsg, quickPrompts, onBack }) {
  const [messages, setMessages] = React.useState([{role:"assistant", content:welcomeMsg}]);
  const [input, setInput] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const endRef = React.useRef(null);

  React.useEffect(() => { endRef.current?.scrollIntoView({behavior:"smooth"}); }, [messages]);

  const fmt = t => t.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br/>");

  const send = async (text) => {
    const msg = text || input.trim();
    if (!msg || loading) return;
    const newMsgs = [...messages, {role:"user", content:msg}];
    setMessages(newMsgs);
    setInput("");
    setLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:1000,
          system:systemPrompt,
          messages:newMsgs.map(m=>({role:m.role, content:m.content}))
        })
      });
      const data = await res.json();
      const reply = data.content?.map(b=>b.text||"").join("") || "Σφάλμα. Δοκιμάστε ξανά.";
      setMessages(prev=>[...prev,{role:"assistant",content:reply}]);
    } catch { setMessages(prev=>[...prev,{role:"assistant",content:"⚠️ Σφάλμα σύνδεσης."}]); }
    finally { setLoading(false); }
  };

  return (
    <div style={{background:C.bg, minHeight:"100vh", display:"flex", flexDirection:"column"}}>
      <TopBar title={title} onBack={onBack}/>
      <div style={{flex:1, overflowY:"auto", padding:"16px 16px 0", maxHeight:"calc(100vh - 140px)"}}>
        {messages.map((m,i)=>(
          <div key={i} style={{display:"flex", flexDirection:m.role==="user"?"row-reverse":"row", gap:8, marginBottom:14, alignItems:"flex-end"}}>
            {m.role==="assistant" && <div style={{width:32,height:32,borderRadius:10,background:C.white,border:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><SymvoLogo size={22}/></div>}
            <div style={{maxWidth:"80%", background:m.role==="user"?C.navy:C.white, color:m.role==="user"?C.white:C.text, borderRadius:m.role==="user"?"18px 4px 18px 18px":"4px 18px 18px 18px", padding:"12px 15px", fontSize:14, lineHeight:1.6, boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}} dangerouslySetInnerHTML={{__html:fmt(m.content)}}/>
          </div>
        ))}
        {loading && (
          <div style={{display:"flex", gap:8, alignItems:"flex-end", marginBottom:14}}>
            <div style={{width:32,height:32,borderRadius:10,background:C.white,border:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center"}}><SymvoLogo size={22}/></div>
            <div style={{background:C.white,borderRadius:"4px 18px 18px 18px",padding:"14px 18px",boxShadow:"0 2px 8px rgba(0,0,0,0.07)",display:"flex",gap:5}}>
              {[0,1,2].map(j=><div key={j} style={{width:7,height:7,borderRadius:"50%",background:C.blue,animation:"pulse 1.2s ease-in-out infinite",animationDelay:`${j*0.2}s`}}/>)}
            </div>
          </div>
        )}
        {messages.length===1 && quickPrompts && (
          <div style={{marginBottom:16}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Συνηθισμένα σενάρια</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {quickPrompts.map((p,i)=><button key={i} onClick={()=>send(p)} style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:20,padding:"7px 14px",color:C.blue,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{p}</button>)}
            </div>
          </div>
        )}
        <div ref={endRef}/>
      </div>
      <div style={{padding:"12px 16px 28px",background:C.white,borderTop:`1px solid ${C.border}`}}>
        <div style={{display:"flex",gap:8,alignItems:"flex-end",background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:16,padding:"8px 8px 8px 14px"}}>
          <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Γράψε εδώ..." rows={1} style={{flex:1,background:"transparent",border:"none",outline:"none",color:C.text,fontSize:14,lineHeight:1.5,resize:"none",fontFamily:"inherit",minHeight:24}}/>
          <button onClick={()=>send()} disabled={!input.trim()||loading} style={{width:38,height:38,borderRadius:12,background:input.trim()&&!loading?C.navy:C.border,border:"none",cursor:input.trim()&&!loading?"pointer":"default",color:C.white,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>➤</button>
        </div>
      </div>
    </div>
  );
}

          <Card key={i} style={{marginBottom:10,padding:"14px 16px",cursor:"pointer"}} onClick={()=>setOpen(open===i?null:i)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{color:C.text,fontWeight:600,fontSize:14,flex:1}}>{f.q}</div>
              <div style={{color:C.blue,fontSize:18,marginLeft:8}}>{open===i?"▲":"▼"}</div>
            </div>
            {open===i && <div style={{color:C.muted,fontSize:13,marginTop:10,lineHeight:1.6,borderTop:`1px solid ${C.border}`,paddingTop:10}}>{f.a}</div>}
          </Card>
        ))}
      </div>
    </div>
  );
}

function BottomNav({ screen, setScreen }) {
  const tabs = [{id:"home",icon:"🏠",label:"Αρχική"},{id:"kok",icon:"⚖️",label:"ΚΟΚ"},{id:"contract",icon:"📄",label:"Συμβόλαιο"},{id:"garage",icon:"🔧",label:"Συνεργείο"}];
  if (!tabs.find(t=>t.id===screen)) return null;
  return (
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.white,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:100,boxShadow:"0 -4px 20px rgba(0,0,0,0.08)"}}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>setScreen(t.id)} style={{flex:1,padding:"10px 0 14px",background:"transparent",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <div style={{fontSize:22}}>{t.icon}</div>
          <div style={{fontSize:10,color:screen===t.id?C.navy:C.muted,fontWeight:screen===t.id?700:400}}>{t.label}</div>
          {screen===t.id && <div style={{width:4,height:4,borderRadius:"50%",background:C.navy}}/>}
        </button>
      ))}
    </div>
  );
}

function App() {
  const [screen, setScreen] = React.useState("home");
  const mainScreens = ["home","kok","contract","garage"];

  const screens = {
    home: <HomeScreen setScreen={setScreen}/>,
    kok: <ChatScreen systemPrompt={SYSTEM_KOK} title="Σύμβουλος ΚΟΚ" welcomeMsg={"Γεια σας! Είμαι ο **Σύμβουλος ΚΟΚ** ⚖️\n\nΠεριγράψτε μου το ατύχημα και θα αναλύσω ποιος ευθύνεται."} quickPrompts={["Χτύπησα πισωπλατά","Σταυροδρόμι χωρίς φανάρι","Βγήκε από παρκινγκ","Πεζός εκτός διάβασης"]} onBack={()=>setScreen("home")}/>,
    guide: <ChatScreen systemPrompt={SYSTEM_GUIDE} title="🚨 Βοήθεια Ατυχήματος" welcomeMsg={"🚨 **Ηρέμησε — είμαι εδώ!**\n\nΠρώτα: **Είσαι καλά; Υπάρχουν τραυματίες;**\n\nΠες μου τι συνέβη."} quickPrompts={["Είμαι καλά, τρακάρισα","Υπάρχει τραυματίας","Δεν ξέρω τι να κάνω"]} onBack={()=>setScreen("home")}/>,
    contract: <ContractScreen onBack={()=>setScreen("home")}/>,
    garage: <GarageScreen onBack={()=>setScreen("home")}/>,
    hospital: <HospitalScreen onBack={()=>setScreen("home")}/>,
    contact: <ContactScreen onBack={()=>setScreen("home")}/>,
    faq: <FAQScreen onBack={()=>setScreen("home")}/>,
  };

  return (
    <div className="app">
      <div style={{paddingBottom:mainScreens.includes(screen)?70:0}}>
        {screens[screen]}
      </div>
      <BottomNav screen={screen} setScreen={setScreen}/>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
